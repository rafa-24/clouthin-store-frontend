<div class="modal-backdrop" (click)="onCancel()"></div>

<div
  class="modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="product-modal-title"
  (click)="$event.stopPropagation()"
>
  <header class="modal__header">
    <div>
      <h2 id="product-modal-title" class="modal__title">Crear Producto</h2>
      <p class="modal__subtitle">Completa los detalles del producto.</p>
    </div>

    <button type="button" class="modal__close" aria-label="Cerrar" (click)="onCancel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </header>

  <form class="modal__form" (ngSubmit)="onSubmit()">
    <div class="preview">
      <img
        class="preview__img"
        [src]="previewImage"
        alt="Vista previa del producto"
        width="64"
        height="64"
      />
      <div class="preview__meta">
        <span class="preview__label">Imagen del producto</span>
        <span class="preview__hint">Se usará la imagen por defecto si no hay URL</span>
      </div>
    </div>

    <div class="field">
      <label class="field__label" for="name">
        Nombre <span class="field__required">*</span>
      </label>
      <input
        id="name"
        name="name"
        type="text"
        class="field__input"
        placeholder="Ej. Auriculares inalámbricos"
        [(ngModel)]="form.name"
        required
      />
    </div>

    <div class="field">
      <label class="field__label" for="description">
        Descripción <span class="field__required">*</span>
      </label>
      <input
        id="description"
        name="description"
        type="text"
        class="field__input"
        placeholder="Describe brevemente el producto..."
        [(ngModel)]="form.description"
        required
      />
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field__label" for="price">
          Precio <span class="field__required">*</span>
        </label>
        <div class="field__prefix">
          <span class="field__prefix-symbol">$</span>
          <input
            id="price"
            name="price"
            type="number"
            min="0"
            step="0.01"
            class="field__input field__input--prefixed"
            placeholder="0.00"
            [(ngModel)]="form.price"
            required
          />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="stock">
          Stock <span class="field__required">*</span>
        </label>
        <input
          id="stock"
          name="stock"
          type="number"
          min="0"
          class="field__input"
          placeholder="0"
          [(ngModel)]="form.stock"
          required
        />
      </div>
    </div>

    <div class="field">
      <label class="field__label" for="category">
        Categoría <span class="field__required">*</span>
      </label>
      <select
        id="category"
        name="category"
        class="field__input field__select"
        [(ngModel)]="form.category"
        required
      >
        <option value="" disabled>Selecciona una categoría...</option>
        @for (category of categories; track category) {
          <option [value]="category">{{ category }}</option>
        }
      </select>
    </div>

    <div class="field">
      <label class="field__label" for="imageUrl">URL de imagen</label>
      <input
        id="imageUrl"
        name="imageUrl"
        type="url"
        class="field__input"
        placeholder="https://..."
        [(ngModel)]="form.imageUrl"
      />
    </div>

    <div class="status-box">
      <div>
        <p class="status-box__title">Estado</p>
        <p class="status-box__subtitle">Visible en el catálogo</p>
      </div>

      <button
        type="button"
        class="toggle"
        [class.is-on]="form.active"
        role="switch"
        [attr.aria-checked]="form.active"
        (click)="form.active = !form.active"
      >
        <span class="toggle__thumb"></span>
      </button>
    </div>

    <footer class="modal__footer">
      <button type="button" class="btn btn--ghost" (click)="onCancel()">
        Cancelar
      </button>
      <button type="submit" class="btn btn--primary">
        Guardar Producto
      </button>
    </footer>
  </form>
</div>
